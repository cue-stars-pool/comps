<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stapleford Cue Stars Pool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: green;  /* Changed to green */
            color: gold;  /* Changed text color to gold */
            padding: 15px 0; /* Reduced padding by 25% (from 20px to 15px) */
        }
        h1 {
            margin: 0;
            font-size: 24px; /* Reduced font size by 25% (from default size to 24px) */
        }
        .sub-header {
            font-size: 18px;
            margin: 10px 0;
        }
        /* CSS to make the hyperlink look like a button */
        .button-link {
            display: inline-block;
            padding: 10px 20px;
            background-color: #FFD700; /* Changed button color to gold */
            color: #008000; /* Changed text color to green */
            text-decoration: none;
            border-radius: 5px; /* Rounded corners */
            text-align: center;
            font-weight: bold;
            transition: background-color 0.3s ease; /* Smooth transition */
        }
        /* Button hover effect */
        .button-link:hover {
            background-color: #e6b800; /* Darker gold shade on hover */
        }

        /* Reduced gap between the buttons (reduced by 5%) */
        p {
            margin: 9.5px 0; /* Reduced from 10px to 9.5px */
        }

        /* Table styling */
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            text-align: center;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background-color: #4CAF50; /* Green background for headers */
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2; /* Alternate row colors */
        }
    </style>
</head>
<body>

<header>
    <h1>Competitions Summer 2026</h1>
</header>

<section>
    <div class="sub-header"></div>
    <div class="sub-header">Blackball Singles</div>
    <div class="sub-header"></div>
</section>

            <th>Home</th>

        </tr>
    </thead>

</body>
</html>
